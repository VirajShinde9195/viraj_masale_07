<!DOCTYPE html>
<html>
<head>
  <title>Reports & Analytics – Viraj Masale</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#0f172a;
      color:white;
    }

    header{
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#020617;
      border-bottom:1px solid #1e293b;
    }

    h1{margin:0;font-size:26px;letter-spacing:1px;}

    .back{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      border:none;
      padding:10px 18px;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      transition:.2s;
    }
    .back:hover{opacity:.8;scale:1.05;}

    .container{
      padding:30px 40px;
      max-width:1400px;
      margin:auto;
    }

/* FILTER BAR */
.filters{
  display:flex;
  gap:15px;
  align-items:center;
  margin-bottom:30px;
  background:#020617;
  padding:20px;
  border-radius:16px;
  border:1px solid #1e293b;
  backdrop-filter:blur(4px);
  box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.filters input{
  background:#0f172a;
  border:1px solid #1e293b;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-size:15px;
}

.filters button{
  background:#22c55e;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:600;
  letter-spacing:.3px;
  transition:.2s;
}
.filters button:hover{scale:1.05;opacity:.9;}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:40px;
}

.kpi{
  background:linear-gradient(145deg,#0f172a,#0b1220);
  padding:22px;
  border-radius:18px;
  border:1px solid #1e293b;
  box-shadow:0 12px 30px rgba(0,0,0,.4);
  transition:.25s;
}
.kpi:hover{transform:translateY(-4px);}
.kpi h2{font-size:28px;margin:0 0 6px;font-weight:700;color:#22c55e;}
.kpi p{margin:0;color:#94a3b8;font-size:14px;}

/* CHART LAYOUT */
.charts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  margin-bottom:40px;
}

.chart-box, .chart-full{
  background:#020617;
  padding:22px;
  border-radius:20px;
  border:1px solid #1e293b;
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  transition:.25s;
}
.chart-box:hover, .chart-full:hover{transform:translateY(-3px);}  

  </style>
</head>

<body>

<header>
  <h1>📊 Reports & Analytics</h1>
  <button class="back" onclick="goBack()">⬅ Back</button>
</header>

<div class="container">

<!-- FILTERS -->
<div class="filters">
  <input type="date" id="fromDate">
  <input type="date" id="toDate">
  <button onclick="applyFilters()">Apply Filters</button>
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><h2 id="revenue">₹0</h2><p>Total Revenue</p></div>
  <div class="kpi"><h2 id="orders">0</h2><p>Total Orders</p></div>
  <div class="kpi"><h2 id="customers">0</h2><p>Total Customers</p></div>
  <div class="kpi"><h2 id="lowStock">0</h2><p>Low Stock Products</p></div>
</div>

<!-- CHARTS -->
<div class="charts">
  <div class="chart-box"><canvas id="ordersChart"></canvas></div>
  <div class="chart-box"><canvas id="revenueChart"></canvas></div>
</div>

<div class="chart-full">
  <canvas id="topProductsChart"></canvas>
</div>

</div>
<!-- <script src="admin-alerts.js"></script> -->

<script>
// Supabase init
const supabaseClient = supabase.createClient(
  "https://uibdyfebaqabjwkctotg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYmR5ZmViYXFhYmp3a2N0b3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU4OTEzMTksImV4cCI6MjA4MTQ2NzMxOX0.ye5ZwULTTAxX2eV0xQqY16ghN4Hzy5-9ejQi7lfJ6kI"
);

function goBack(){ location.href="admin_welcome.html"; }

// checkLowStockGlobal();

async function applyFilters(){
  const from=document.getElementById("fromDate").value;
  const to=document.getElementById("toDate").value;

  let q=supabaseClient.from("orders")
    .select("id,total_amount,created_at")
    .eq("status","delivered");

  if(from) q=q.gte("created_at",from);
  if(to) q=q.lte("created_at",to+"T23:59:59");

  const { data:orders } = await q;

  updateKPIs(orders);
  buildOrdersChart(orders);
  buildRevenueChart(orders);
}

function updateKPIs(orders){
  let revenue=orders.reduce((s,o)=>s+o.total_amount,0);
  revenueEl.innerText="₹"+revenue.toFixed(2);
  ordersEl.innerText=orders.length;
}

const revenueEl=document.getElementById("revenue");
const ordersEl=document.getElementById("orders");
const customersEl=document.getElementById("customers");
const lowStockEl=document.getElementById("lowStock");

function groupByDate(list){
  const map = {};

  list.forEach(i => {
    const d = new Date(i.created_at).toISOString().split("T")[0]; // YYYY-MM-DD
    map[d] = (map[d] || 0) + 1;
  });

  // SORT by date
  return Object.fromEntries(
    Object.entries(map).sort(
      (a, b) => new Date(a[0]) - new Date(b[0])
    )
  );
}


function buildOrdersChart(orders) {
  const grouped = groupByDate(orders);

  new Chart(ordersChart, {
    type: "line",
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: "Orders",
        data: Object.values(grouped),
        tension: 0.4,
        borderColor: "#22c55e",
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            stepSize: 1, // ✨ Show only 1,2,3... no decimals
            callback: function (value) {
              return Number.isInteger(value) ? value : "";
            }
          }
        }
      }
    }
  });
}

let revenueChartInstance = null;

function buildRevenueChart(orders) {
  const map = {};

  orders.forEach(o => {
    const d = new Date(o.created_at).toISOString().split("T")[0];
    map[d] = (map[d] || 0) + o.total_amount;
  });

  const sorted = Object.entries(map).sort(
    (a, b) => new Date(a[0]) - new Date(b[0])
  );

  const labels = sorted.map(i => i[0]);
  const values = sorted.map(i => i[1]);

  if (revenueChartInstance) {
    revenueChartInstance.destroy();
  }

  revenueChartInstance = new Chart(revenueChart, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Revenue (₹)",
        data: values,
        backgroundColor: "#38bdf8"
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
}



async function buildTopProducts() {
  const { data, error } = await supabaseClient
    .from("order_items")
    .select(`
      quantity,
      grams,
      orders(status),
      products(name)
    `)
    .eq("orders.status", "delivered");

  if (error) {
    console.error("Top products error:", error);
    return;
  }

  // 🔢 AGGREGATE SOLD GRAMS PER PRODUCT
  const map = {};

  data.forEach(i => {
    const name = i.products.name;
    const soldGrams = i.grams * i.quantity;

    map[name] = (map[name] || 0) + soldGrams;
  });

  // 🔝 TOP 10 PRODUCTS
  const entries = Object.entries(map)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  const labels = entries.map(e => e[0]);
  const values = entries.map(e => (e[1] / 1000).toFixed(2)); // KG

  // 🧹 CLEAR OLD CHART (IMPORTANT)
  if (window.topProductsChartInstance) {
    window.topProductsChartInstance.destroy();
  }

  // 📊 BAR CHART
  window.topProductsChartInstance = new Chart(topProductsChart, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Top 10 Masalas Sold (KG)",
          data: values,
          borderWidth: 2,
          backgroundColor: "#22c55e"
        }
      ]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: {
        legend: { display: true }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: {
            callback: value => value + " kg"
          }
        },
        y: {
          beginAtZero: true
        }
      }
    }
  });
}

applyFilters();
buildTopProducts();

async function loadCustomersCount(){
  const { count } = await supabaseClient
    .from("customers")
    .select("*",{ count:"exact", head:true });

  customersEl.innerText=count;
}
loadCustomersCount();

async function loadLowStock(){
  const { data } = await supabaseClient
    .from("products")
    .select("id")
    .lt("stock_quantity",1000);

  lowStockEl.innerText=data.length;
}
loadLowStock();

</script>

</body>
</html>
