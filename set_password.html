<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set New Password</title>
  <style>
    body { font-family: Arial; background: #f9f9f9; padding: 30px; }
    .container { max-width: 400px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
    button { background: #e65100; color: white; border: none; cursor: pointer; }
    button:hover { background: #bf360c; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Forgot Password</h2>
    <input type="text" id="customerId" placeholder="Enter your Customer ID" required>
    <input type="password" id="newPassword" placeholder="Enter New Password" required>
    <button onclick="resetPassword()">Set New Password</button>
    <p id="message"></p>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzHMOVbXBx2kRjZyuAbqIYlCbCaKzjICYYQINKMn9bpy6-aa7qj7zEhO0aeUOqIwPzskQ/exec"; // Replace with your script URL

    function resetPassword() {
      const customerId = document.getElementById("customerId").value.trim();
      const password = document.getElementById("newPassword").value;

      if (!customerId || !password) {
        document.getElementById("message").textContent = "❌ Please fill all fields.";
        return;
      }

      const formData = new FormData();
      formData.append("action", "setPassword");
      formData.append("customerId", customerId);
      formData.append("password", password);

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            document.getElementById("message").textContent = "✅ Password updated successfully. You can now login.";
          } else {
            document.getElementById("message").textContent = "❌ Customer ID not found.";
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById("message").textContent = "❌ Failed to update password.";
        });
    }
  </script>
</body>
</html>
