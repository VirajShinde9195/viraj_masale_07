// 🔄 UPDATE STATUS WITH STOCK DEDUCTION
async function updateStatus(id, newStatus) {

  const { data:{session} } = await supabaseClient.auth.getSession();
  if(!session){
    alert("Session expired. Please login again.");
    location.href="login_supa.html";
    return;
  }

  // 🔍 Get current order status
  const { data: order, error: fetchErr } = await supabaseClient
    .from("orders")
    .select("status")
    .eq("id", id)
    .single();

  if (fetchErr || !order) {
    alert("Order not found");
    loadOrders();
    return;
  }

  // 🚫 HARD BLOCK: Delivered → no cancel
  if (order.status === "delivered" && newStatus === "cancelled") {
    alert("❌ Delivered order cannot be cancelled");
    loadOrders(); // reset dropdown
    return;
  }

  // ❌ CANCEL FLOW
  if (newStatus === "cancelled") {

    const reason = prompt("❌ Enter cancel reason (customer will see this):");

    if (!reason || reason.trim().length < 3) {
      alert("Cancel reason is required");
      loadOrders(); // reset dropdown
      return;
    }

    const { error } = await supabaseClient.rpc("cancel_order", {
      p_order_id: id,
      p_reason: reason.trim()
    });

    if (error) {
      console.error("Cancel failed:", error);
      alert("❌ Failed to cancel order");
      loadOrders();
      return;
    }

    loadOrders();
    return;
  }

  // ✅ ACCEPT ORDER → stock handled in DB
  if (newStatus === "accepted") {

    const { error } = await supabaseClient
      .rpc("accept_order", { p_order_id: id });

    if (error) {
      alert("❌ Cannot accept order (insufficient stock)");
      console.error(error);
      loadOrders();
      return;
    }

    loadOrders();
    return;
  }

  // 🔄 NORMAL STATUS UPDATE
  const { error } = await supabaseClient
    .from("orders")
    .update({ status: newStatus })
    .eq("id", id);

  if (error) {
    alert("Update failed");
    console.error(error);
    loadOrders();
    return;
  }

  loadOrders();
}

function toggleReason(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle("hidden");
}
