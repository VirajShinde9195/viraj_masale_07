<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body {
      height: 100vh;
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #e95a4bb3, #f66868, #d44c2d99);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* floating circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.55;
      animation: float 6s ease-in-out infinite alternate;
    }
    .c1 { width: 280px; height: 280px; background: #f98323f8; top: -40px; left: -60px; }
    .c2 { width: 240px; height: 240px; background: #ff8a36; bottom: -60px; right: -40px; }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(22px); }
    }

    /* Glass card */
    .card {
      width: 400px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #064e3b;
      margin-bottom: 25px;
      font-size: 30px;
    }

    .password-box {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      
      background: rgba(248, 227, 121, 0.363);
      margin-bottom: 15px;
      font-size: 16px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .eye {
      position: absolute;
      right: 12px;
      top: 14px;
      cursor: pointer;
      color: #555;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #630202, #ee5a5a);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 10px rgba(20,184,166,0.45);
    }

    #msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">
  <h2>Set New Password</h2>

  <div class="password-box">
    <input type="password" id="newPassword" placeholder="Enter new password">
    <i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
  </div>

  <button id="updateBtn">Update Password</button>
  <p id="msg"></p>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "https://uibdyfebaqabjwkctotg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYmR5ZmViYXFhYmp3a2N0b3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU4OTEzMTksImV4cCI6MjA4MTQ2NzMxOX0.ye5ZwULTTAxX2eV0xQqY16ghN4Hzy5-9ejQi7lfJ6kI"
  );

  function togglePassword() {
    const pwd = document.getElementById("newPassword");
    pwd.type = pwd.type === "password" ? "text" : "password";
  }

  window.addEventListener("load", async () => {
    const { data } = await supabaseClient.auth.getSession();
    if (!data.session) {
      document.getElementById("msg").style.color = "red";
      document.getElementById("msg").innerText = "❌ Invalid or expired reset link!";
    }
  });

  document.getElementById("updateBtn").addEventListener("click", async () => {
    const password = document.getElementById("newPassword").value;

    if (!password) {
      alert("Please enter password");
      return;
    }

    const { error } = await supabaseClient.auth.updateUser({ password });

    if (error) {
      document.getElementById("msg").style.color = "red";
      document.getElementById("msg").innerText = error.message;
    } else {
      document.getElementById("msg").style.color = "green";
      document.getElementById("msg").innerText = "✔ Password updated! Redirecting...";

      setTimeout(() => window.location.href = "login_supa.html", 2000);
    }
  });
</script>

</body>
</html>
