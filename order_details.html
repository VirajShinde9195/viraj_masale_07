    footer {

    @keyframes bounce {

 <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCRaPf-khd5b9xr-F_3liPnB8asJnQcw-0",
    authDomain: "virajmasale9195.firebaseapp.com",
    projectId: "virajmasale9195",
    storageBucket: "virajmasale9195.appspot.com",
    messagingSenderId: "257333053440",
    appId: "1:257333053440:web:08e92a23f14a1617ba70e5"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const cid = localStorage.getItem("loggedInCustomerId");
  if (!cid) {
    alert("🔒 Please login first.");
    window.location.href = "login.html";
  }

  window.onload = async () => {
    try {
      // Get user data from Firebase
      const snapshot = await db.collection("registration")
        .where("customerId", "==", cid)
        .get();

      if (snapshot.empty) {
        alert("⚠️ Invalid login session. Please login again.");
        localStorage.clear();
        window.location.href = "login.html";
        return;
      }

      const userData = snapshot.docs[0].data();
      const name = userData.name;
      const address = userData.village + ", " + userData.taluka + ", " + userData.district;
      const date = new Date().toLocaleDateString();

      const summary = localStorage.getItem("lastOrderSummary") || "No order summary available.";
      const total = localStorage.getItem("lastOrderTotal") || "0.00";
      const phone = "9322789195";

      document.getElementById("custName").textContent = name;

      document.getElementById("orderSummary").innerHTML = `
        <b>Order Details:</b><br>
        👤 Name: ${name}<br>
        🆔 Customer ID: ${cid}<br>
        🏠 Address: ${address}<br>
        📅 Order Date: ${date}<br><br>
        ${summary.replace(/\n/g, "<br>")}
        <br><br><b>Total:</b> ₹${total}
      `;

      const delivery = new Date(Date.now() + 86400000).toDateString();
      document.getElementById("deliveryDate").textContent = delivery;

      const whatsappMessage = encodeURIComponent(
        `🛒 *Viraj Masale Order Confirmation*\n👤 Name: ${name}\n🆔 ID: ${cid}\n🏠 Address: ${address}\n📅 Order Date: ${date}\n\n${summary}\n\n💰 Total: ₹${total}`
      );

      document.getElementById("whatsappBtn").href = `https://wa.me/${phone}?text=${whatsappMessage}`;
    } catch (err) {
      console.error(err);
      alert("❌ Something went wrong. Please refresh the page.");
    }
  };
</script>
<script>
  const badgeCid = localStorage.getItem("loggedInCustomerId");
  if (badgeCid) {
    document.getElementById("badgeCustomerId").textContent = badgeCid;
  } else {
    document.getElementById("userBadge").style.display = "none";
  }
</script>
