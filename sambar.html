<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sambar Masala - Viraj Masale</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #fff7f0;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      color: #d91440;
      text-align: center;
    }

    .product-image {
      text-align: center;
      margin: 20px 0;
    }

    .product-image img {
      max-width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .info {
      margin: 20px 0;
      font-size: 18px;
    }

    .info ul {
      line-height: 1.8;
    }

    .video-container {
      text-align: center;
      margin: 30px 0;
    }

    iframe {
      width: 100%;
      max-width: 600px;
      height: 350px;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      color: green;
      margin-top: 20px;
      text-align: center;
    }

    .back-link {
      display: block;
      margin-top: 30px;
      text-align: center;
      text-decoration: none;
      background: #d91440;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .back-link:hover {
      background: #a30f2d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍛 Sambar Masala</h1>

    <div class="product-image">
      <img src="https://i.imgur.com/SvKOBaU.jpg" alt="Sambar Masala">
    </div>

    <div class="info">
      <h2>Ingredients:</h2>
      <ul>
        <li>Toor dal, coriander, cumin</li>
        <li>Red chilli, fenugreek, mustard seeds</li>
        <li>Dry coconut, curry leaves</li>
        <li>Authentic South Indian blend</li>
      </ul>
    </div>

    <div class="video-container">
      <h2>Watch How We Make It:</h2>
      <iframe src="https://www.youtube.com/embed/p27JBBM7Nug" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="price">
      💰 Price: ₹160 per 1kg
    </div>

    <a class="back-link" href="products.html">← Back to Products</a>
  </div>
</body>
</html>
