<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Viraj Masale</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 30px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <header><h1>Spice Gallery</h1></header>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="shop.html">Shop</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About Us</a>
    <a href="https://goo.gl/maps/your-shop-location" target="_blank">📍 Location</a>
  </nav>

  <main>
    <div class="gallery">
      <img src="viraj_shop_1.png" alt="Spice1">
      <img src="viraj_shop_1.png" alt="Spice2">
      <img src="viraj_shop_1.png" alt="Spice3">
      <img src="viraj_shop_1.png" alt="Spice4">
    </div>
  </main>

  <footer>© 2025 Viraj Masale</footer> 
  <!-- bell on index page  -->
<audio id="soundAccepted" preload="auto">
  <source src="bell.wav" type="audio/mpeg">
</audio>

<audio id="soundDelivered" preload="auto">
  <source src="bell_2.wav" type="audio/mpeg">
</audio>

  <script src="notifications.js"></script>

</body>
</html>
