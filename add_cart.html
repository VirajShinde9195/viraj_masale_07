function normalizeCart(rawCart) {
  return rawCart.map(item => {
    // OLD FORMAT detected → auto convert
    if (item.qty !== undefined && item.total !== undefined) {
      return {
        id: item.id,
        name: item.name,
        pricePerGram: Number(item.pricePerGram),
        grams: Number(item.qty),
        quantity: 1
      };
    }

    // NEW FORMAT → keep as is
    return {
      id: item.id,
      name: item.name,
      pricePerGram: Number(item.pricePerGram),
      grams: Number(item.grams),
      quantity: Number(item.quantity)
    };
  });
}

// Fetch stock quantities for given product IDs
async function getStockMap(productIds) {
  const { data, error } = await supabaseClient
    .from("products")
    .select("id, stock_quantity, reserved_quantity")
    .in("id", productIds);

  if (error) {
    console.error("❌ Stock fetch error:", error);
    return {};
  }

  const map = {};
  data.forEach(p => {
    map[p.id] = {
      stock: p.stock_quantity,
      reserved: p.reserved_quantity
    };
  });

  return map;
}

// Load Cart
async function loadCart() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const cartKey = getCartKey(session);

  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  const tbody = document.querySelector("#cartTable tbody");
  const emptyMsg = document.getElementById("emptyMsg");
  const totalBox = document.getElementById("cartTotal");

  tbody.innerHTML = "";
  let grandTotal = 0;

  if (!cart.length) {
    emptyMsg.style.display = "block";
    totalBox.textContent = "";
    return;
  }

  emptyMsg.style.display = "none";

  // 🔥 FETCH STOCK FROM DB
  const productIds = cart.map(i => i.id);
  const stockMap = await getStockMap(productIds);

  cart.forEach((item, index) => {
    const itemTotal =
      item.pricePerGram * item.grams * item.quantity;

    grandTotal += itemTotal;

    // 🧮 USED GRAMS
    // const usedGrams = item.grams * item.quantity;

    // 📦 AVAILABLE STOCK (grams → kg)
    const stockData = stockMap[item.id] || { stock: 0, reserved: 0 };
    
    // ✅ REAL AVAILABLE STOCK
    const availableGrams =
      stockData.stock - stockData.reserved;
    
    // User cart usage
    const usedGrams = item.grams * item.quantity;
    
    // Remaining after cart
    const remainingKg = Math.max(
      (availableGrams - usedGrams) / 1000,
      0
    ).toFixed(2);
    
    // const dbStock = stockMap[item.id] ?? 0;
    // const remainingKg = Math.max(
    //   (dbStock - usedGrams) / 1000,
    //   0
    // ).toFixed(2);

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>
        ${item.name}<br>
        <small style="color:green">
          Available: ${remainingKg} kg
        </small>
      </td>

      <td>
        <button class="table-btn" onclick="changeGrams(${index}, -50)">−</button>
        <span>${item.grams}</span>
        <button class="table-btn" onclick="changeGrams(${index}, 50)">+</button>
      </td>
      
      <td>
        <button class="table-btn" onclick="changeQty(${index}, -1)">−</button>
        <span>${item.quantity}</span>
        <button class="table-btn" onclick="changeQty(${index}, 1)">+</button>
      </td>

      <td>₹${itemTotal.toFixed(2)}</td>

     <td>
       <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
     </td>
    `;

    tbody.appendChild(row);
  });

  totalBox.textContent = `Total Price: ₹${grandTotal.toFixed(2)}`;
}

async function getDBStock(productId) {
  const map = await getStockMap([productId]);

  if (!map[productId]) return 0;

  const { stock, reserved } = map[productId];

  // ✅ REAL AVAILABLE STOCK
  return Math.max(stock - reserved, 0); // grams
}

async function changeQty(index, delta) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const cartKey = getCartKey(session);

  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  let item = cart[index];

  const newQty = item.quantity + delta;

  if (newQty <= 0) {
    cart.splice(index, 1);
    localStorage.setItem(cartKey, JSON.stringify(cart));
    loadCart();
    updateCartCount();
    return;
  }

  // 🔥 DB STOCK CHECK
  const dbStock = await getDBStock(item.id);
  const usedGrams = newQty * item.grams;

  if (usedGrams > dbStock) {
    alert(`❌ Only ${(dbStock / 1000).toFixed(2)} kg available`);
    return;
  }

  item.quantity = newQty;

  localStorage.setItem(cartKey, JSON.stringify(cart));
  loadCart();
  updateCartCount();
}

async function changeGrams(index, delta) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const cartKey = getCartKey(session);

  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  let item = cart[index];

  const newGrams = item.grams + delta;

  if (newGrams < 50) {
    item.grams = 50;
    localStorage.setItem(cartKey, JSON.stringify(cart));
    loadCart();
    return;
  }

  // 🔥 DB STOCK CHECK
  const dbStock = await getDBStock(item.id);
  const usedGrams = newGrams * item.quantity;

  if (usedGrams > dbStock) {
    alert(`❌ Max allowed ${(dbStock / 1000).toFixed(2)} kg`);
    return;
  }

  item.grams = newGrams;

  localStorage.setItem(cartKey, JSON.stringify(cart));
  loadCart();
}

async function removeItem(index) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const cartKey = getCartKey(session);

  let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  cart.splice(index, 1);

  localStorage.setItem(cartKey, JSON.stringify(cart));
  loadCart();
  updateCartCount();
}


// 🔢 Badge
async function updateCartCount() {
  const badge = document.getElementById("cartCount");
  if (!badge) return;

  const { data: { session } } = await supabaseClient.auth.getSession();
  const cartKey = getCartKey(session);

  const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
  badge.textContent = cart.length;
}
